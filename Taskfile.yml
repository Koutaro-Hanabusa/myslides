# https://taskfile.dev

version: '3'

vars:
  GREETING: Hello, World!
  PRESENTATION_DIR: apps/web/src/app/presentation
  DEFAULT_SLIDE_COUNT: 5
  R2_BASE_URL: https://pub-12dea38316b14a799f73d17465eadeb1.r2.dev
  TEMPLATE_PATH: 外部登壇資料テンプレ

tasks:
  default:
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  new-slide-corp:
    desc: Create a new presentation with corporate R2 background templates
    summary: |
      Usage:
        task new-slide-corp -- <name>
        task new-slide-corp  (interactive mode)

      Examples:
        task new-slide-corp -- my-presentation

      Structure:
        - cover.tsx (表紙)
        - corporate-philosophy.tsx (企業理念)
        - business-content.tsx (事業内容)
        - self-introduction.tsx (自己紹介)
        - content.tsx (見出し1枚 + 本文1枚をまとめたファイル)
        - back-cover.tsx (裏表紙)
    cmds:
      - |
        # CLIオプションをパース
        NAME=""
        SLIDE_COUNT="{{.DEFAULT_SLIDE_COUNT}}"

        for arg in {{.CLI_ARGS}}; do
          case $arg in
            slides=*)
              SLIDE_COUNT="${arg#*=}"
              ;;
            *)
              if [ -z "$NAME" ]; then
                NAME="$arg"
              fi
              ;;
          esac
        done

        if [ -z "$NAME" ]; then
          echo "Enter presentation name:"
          read NAME
        fi

        if [ -z "$NAME" ]; then
          echo "Error: Presentation name is required"
          exit 1
        fi

        TARGET_DIR="{{.PRESENTATION_DIR}}/$NAME"
        R2_BASE="{{.R2_BASE_URL}}/{{.TEMPLATE_PATH}}"

        if [ -d "$TARGET_DIR" ]; then
          echo "Error: Presentation '$NAME' already exists"
          exit 1
        fi

        mkdir -p "$TARGET_DIR/slides"

        # page.tsx を作成
        {
          echo '"use client";'
          echo ''
          echo 'import RevealPresentation from "@/components/reveal-presentation";'
          echo 'import BackCover from "./slides/back-cover";'
          echo 'import BusinessContent from "./slides/business-content";'
          echo 'import Content from "./slides/content";'
          echo 'import CorporatePhilosophy from "./slides/corporate-philosophy";'
          echo 'import Cover from "./slides/cover";'
          echo 'import SelfIntroduction from "./slides/self-introduction";'
          echo ''
          echo 'export default function PresentationPage() {'
          echo '	return ('
          echo '		<div className="h-full w-full">'
          echo '			<RevealPresentation transition="slide">'
          echo '				<Cover />'
          echo '				<SelfIntroduction />'
          echo '				<CorporatePhilosophy />'
          echo '				<BusinessContent />'
          echo '				<Content />'
          echo '				<BackCover />'
          echo '			</RevealPresentation>'
          echo '		</div>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/page.tsx"

        # 表紙スライド (cover.tsx)
        {
          echo 'export default function Cover() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/千_外部登壇スライド_表紙.png\""
          echo '			data-background-size="contain"'
          echo '		>'
          echo "			<h1>$NAME</h1>"
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/cover.tsx"

        # 企業理念スライド (corporate-philosophy.tsx)
        {
          echo 'export default function CorporatePhilosophy() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/千_外部登壇スライド_企業理念.png\""
          echo '			data-background-size="contain"'
          echo '		>'
          echo '			{/* コンテンツをここに追加 */}'
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/corporate-philosophy.tsx"

        # 事業内容スライド (business-content.tsx)
        {
          echo 'export default function BusinessContent() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/千_外部登壇スライド_事業内容.png\""
          echo '			data-background-size="contain"'
          echo '		>'
          echo '			{/* コンテンツをここに追加 */}'
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/business-content.tsx"

        # 自己紹介スライド (self-introduction.tsx)
        {
          echo 'export default function SelfIntroduction() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/千_外部登壇スライド_本文.png\""
          echo '			data-background-size="contain"'
          echo '		>'
          echo '			<div className="flex h-full flex-row items-center justify-evenly">'
          echo '				{/* 画像をここに追加 */}'
          echo '				<div className="flex flex-col">'
          echo '					<h2>自己紹介</h2>'
          echo '					<ul className="space-y-2 text-left text-black md:space-y-4 lg:space-y-6">'
          echo '						<li>{/* 名前・SNS */}</li>'
          echo '						<li>{/* 所属 */}</li>'
          echo '						<li>{/* 業務内容 */}</li>'
          echo '						<li>{/* 趣味など */}</li>'
          echo '					</ul>'
          echo '				</div>'
          echo '			</div>'
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/self-introduction.tsx"

        # コンテンツスライド (content.tsx) - 見出し1枚 + 本文1枚をまとめたファイル
        {
          echo 'export default function Content() {'
          echo '	return ('
          echo '		<>'
          echo '			{/* 見出しスライド */}'
          echo '			<section'
          echo "				data-background-image=\"$R2_BASE/千_外部登壇スライド_見出し.png\""
          echo '				data-background-size="contain"'
          echo '			>'
          echo '				{/* 見出しコンテンツをここに追加 */}'
          echo '			</section>'
          echo ''
          echo '			{/* 本文スライド */}'
          echo '			<section'
          echo "				data-background-image=\"$R2_BASE/千_外部登壇スライド_本文.png\""
          echo '				data-background-size="contain"'
          echo '			>'
          echo '				{/* 本文コンテンツをここに追加 */}'
          echo '			</section>'
          echo '		</>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/content.tsx"

        # 裏表紙スライド (back-cover.tsx)
        {
          echo 'export default function BackCover() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/千_外部登壇スライド_裏表紙.png\""
          echo '			data-background-size="contain"'
          echo '		>'
          echo '			{/* コンテンツをここに追加 */}'
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/back-cover.tsx"

        # layout.tsx を作成（全画面固定スタイル付き）
        {
          echo 'import type { Metadata, Viewport } from "next";'
          echo ''
          echo 'export const metadata: Metadata = {'
          echo "	title: \"$NAME | mySlides\","
          echo "	description: \"$NAME - A presentation created with mySlides and Reveal.js\","
          echo '	openGraph: {'
          echo "		title: \"$NAME\","
          echo "		description: \"$NAME - A presentation created with mySlides and Reveal.js\","
          echo '		type: "website",'
          echo '	},'
          echo '	twitter: {'
          echo '		card: "summary_large_image",'
          echo "		title: \"$NAME\","
          echo "		description: \"$NAME - A presentation created with mySlides and Reveal.js\","
          echo '	},'
          echo '};'
          echo ''
          echo 'export const viewport: Viewport = {'
          echo '	width: "device-width",'
          echo '	initialScale: 1,'
          echo '	maximumScale: 1,'
          echo '	userScalable: false,'
          echo '};'
          echo ''
          echo 'export default function Layout({ children }: { children: React.ReactNode }) {'
          echo '	return ('
          echo '		<div className="fixed inset-0 h-dvh w-full overflow-hidden">{children}</div>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/layout.tsx"

        # opengraph-image.tsx を作成
        {
          echo 'import { ImageResponse } from "next/og";'
          echo ''
          echo "export const alt = \"$NAME\";"
          echo 'export const size = {'
          echo '	width: 1200,'
          echo '	height: 630,'
          echo '};'
          echo 'export const contentType = "image/png";'
          echo ''
          echo 'export default function Image() {'
          echo '	return new ImageResponse('
          echo '		<div'
          echo '			style={{ "{{" }}'
          echo '				width: "100%",'
          echo '				height: "100%",'
          echo '				display: "flex",'
          echo '				alignItems: "center",'
          echo '				justifyContent: "center",'
          echo '				position: "relative",'
          echo '			{{ "}}" }}'
          echo '		>'
          echo '			<img'
          echo "				src=\"$R2_BASE/千_外部登壇スライド_表紙.png\""
          echo '				style={{ "{{" }}'
          echo '					position: "absolute",'
          echo '					top: 0,'
          echo '					left: 0,'
          echo '					width: "100%",'
          echo '					height: "100%",'
          echo '					objectFit: "cover",'
          echo '				{{ "}}" }}'
          echo '			/>'
          echo '		</div>,'
          echo '		{'
          echo '			width: 1200,'
          echo '			height: 630,'
          echo '		}'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/opengraph-image.tsx"

        # page.tsx にSlideCardを追加
        PAGE_FILE="{{.PRESENTATION_DIR}}/page.tsx"

        # PascalCase変換: ハイフンを削除し、各単語の最初の文字を大文字にする
        PASCAL_NAME=$(echo "$NAME" | perl -pe 's/(^|-)(.)/uc($2)/ge')

        # Coverコンポーネントのインポート文を追加 (SlideCard インポートの後に)
        perl -i -pe "print \"import ${PASCAL_NAME}Cover from \\\"./${NAME}/slides/cover\\\";\n\" if /^import SlideCard from/" "$PAGE_FILE"

        # SlideCardコンポーネントを追加 (グリッド内の</div>の前に - タブ4つのインデント)
        perl -i -pe "s|^(\t\t\t</div>)|\n\t\t\t\t<SlideCard href=\"/presentation/${NAME}\" title=\"${PASCAL_NAME}\">\n\t\t\t\t\t<${PASCAL_NAME}Cover />\n\t\t\t\t</SlideCard>\n\1|" "$PAGE_FILE"

        echo "✓ Created presentation '$NAME' with 7 slides"
        echo "  - 表紙: 1枚"
        echo "  - 企業理念: 1枚"
        echo "  - 事業内容: 1枚"
        echo "  - 自己紹介: 1枚"
        echo "  - コンテンツ: 2枚 (見出し1枚 + 本文1枚)"
        echo "  - 裏表紙: 1枚"
        echo "  Location: $TARGET_DIR"
        echo "✓ Added SlideCard with ${PASCAL_NAME}Cover to page.tsx"
    silent: false

  new-slide:
    desc: Create a new simple presentation with burio16 template
    summary: |
      Usage:
        task new-slide -- <name>
        task new-slide  (interactive mode)

      Examples:
        task new-slide -- my-presentation

      Structure:
        - cover.tsx (表紙 - burio16Cover.png)
        - content.tsx (内容 - content.png)

      Note: For corporate template, use 'task new-slide-corp'
    cmds:
      - |
        # CLIオプションをパース
        NAME=""

        for arg in {{.CLI_ARGS}}; do
          if [ -z "$NAME" ]; then
            NAME="$arg"
          fi
        done

        if [ -z "$NAME" ]; then
          echo "Enter presentation name:"
          read NAME
        fi

        if [ -z "$NAME" ]; then
          echo "Error: Presentation name is required"
          exit 1
        fi

        TARGET_DIR="{{.PRESENTATION_DIR}}/$NAME"
        R2_BASE="{{.R2_BASE_URL}}"

        if [ -d "$TARGET_DIR" ]; then
          echo "Error: Presentation '$NAME' already exists"
          exit 1
        fi

        mkdir -p "$TARGET_DIR/slides"

        # page.tsx を作成
        {
          echo '"use client";'
          echo ''
          echo 'import RevealPresentation from "@/components/reveal-presentation";'
          echo 'import Content from "./slides/content";'
          echo 'import Cover from "./slides/cover";'
          echo ''
          echo 'export default function PresentationPage() {'
          echo '	return ('
          echo '		<div className="h-full w-full">'
          echo '			<RevealPresentation transition="slide">'
          echo '				<Cover />'
          echo '				<Content />'
          echo '			</RevealPresentation>'
          echo '		</div>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/page.tsx"

        # 表紙スライド (cover.tsx)
        {
          echo 'export default function Cover() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/burio16Cover.png\""
          echo '			data-background-size="contain"'
          echo '		>'
          echo "			<h1>$NAME</h1>"
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/cover.tsx"

        # コンテンツスライド (content.tsx)
        {
          echo 'export default function Content() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/content.png\""
          echo '			data-background-size="contain"'
          echo '		>'
          echo '			{/* コンテンツをここに追加 */}'
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/content.tsx"

        # layout.tsx を作成（全画面固定スタイル付き）
        {
          echo 'import type { Metadata, Viewport } from "next";'
          echo ''
          echo 'export const metadata: Metadata = {'
          echo "	title: \"$NAME | mySlides\","
          echo "	description: \"$NAME - A presentation created with mySlides and Reveal.js\","
          echo '	openGraph: {'
          echo "		title: \"$NAME\","
          echo "		description: \"$NAME - A presentation created with mySlides and Reveal.js\","
          echo '		type: "website",'
          echo '	},'
          echo '	twitter: {'
          echo '		card: "summary_large_image",'
          echo "		title: \"$NAME\","
          echo "		description: \"$NAME - A presentation created with mySlides and Reveal.js\","
          echo '	},'
          echo '};'
          echo ''
          echo 'export const viewport: Viewport = {'
          echo '	width: "device-width",'
          echo '	initialScale: 1,'
          echo '	maximumScale: 1,'
          echo '	userScalable: false,'
          echo '};'
          echo ''
          echo 'export default function Layout({ children }: { children: React.ReactNode }) {'
          echo '	return ('
          echo '		<div className="fixed inset-0 h-dvh w-full overflow-hidden">{children}</div>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/layout.tsx"

        # opengraph-image.tsx を作成
        {
          echo 'import { ImageResponse } from "next/og";'
          echo ''
          echo "export const alt = \"$NAME\";"
          echo 'export const size = {'
          echo '	width: 1200,'
          echo '	height: 630,'
          echo '};'
          echo 'export const contentType = "image/png";'
          echo ''
          echo 'export default function Image() {'
          echo '	return new ImageResponse('
          echo '		<div'
          echo '			style={{'
          echo '				width: "100%",'
          echo '				height: "100%",'
          echo '				display: "flex",'
          echo '				alignItems: "center",'
          echo '				justifyContent: "center",'
          echo '				position: "relative",'
          echo '			}}'
          echo '		>'
          echo '			{/* biome-ignore lint/performance/noImgElement: next/og ImageResponseではimg要素が必要 */}'
          echo '			<img'
          echo "				src=\"$R2_BASE/burio16Cover.png\""
          echo '				alt="スライド表紙"'
          echo '				style={{'
          echo '					position: "absolute",'
          echo '					top: 0,'
          echo '					left: 0,'
          echo '					width: "100%",'
          echo '					height: "100%",'
          echo '					objectFit: "cover",'
          echo '				}}'
          echo '			/>'
          echo '		</div>,'
          echo '		{'
          echo '			width: 1200,'
          echo '			height: 630,'
          echo '		}'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/opengraph-image.tsx"

        # page.tsx にSlideCardを追加
        PAGE_FILE="{{.PRESENTATION_DIR}}/page.tsx"

        # PascalCase変換: ハイフンを削除し、各単語の最初の文字を大文字にする
        PASCAL_NAME=$(echo "$NAME" | perl -pe 's/(^|-)(.)/uc($2)/ge')

        # Coverコンポーネントのインポート文を追加 (SlideCard インポートの後に)
        perl -i -pe "print \"import ${PASCAL_NAME}Cover from \\\"./${NAME}/slides/cover\\\";\n\" if /^import SlideCard from/" "$PAGE_FILE"

        # SlideCardコンポーネントを追加 (グリッド内の</div>の前に - タブ4つのインデント)
        perl -i -pe "s|^(\t\t\t</div>)|\n\t\t\t\t<SlideCard href=\"/presentation/${NAME}\" title=\"${PASCAL_NAME}\">\n\t\t\t\t\t<${PASCAL_NAME}Cover />\n\t\t\t\t</SlideCard>\n\1|" "$PAGE_FILE"

        echo "✓ Created presentation '$NAME' with 2 slides"
        echo "  - 表紙: 1枚 (burio16Cover.png)"
        echo "  - 内容: 1枚 (content.png)"
        echo "  Location: $TARGET_DIR"
        echo "✓ Added SlideCard with ${PASCAL_NAME}Cover to page.tsx"
    silent: false
