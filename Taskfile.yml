          echo '			data-background-size="contain"'
          echo '		>'
          echo "			<h1>$NAME</h1>"
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/cover.tsx"

        # コンテンツスライド (content.tsx)
