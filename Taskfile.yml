# https://taskfile.dev

version: '3'

vars:
  GREETING: Hello, World!
  PRESENTATION_DIR: apps/web/src/app/presentation
  DEFAULT_SLIDE_COUNT: 5
  R2_BASE_URL: https://pub-12dea38316b14a799f73d17465eadeb1.r2.dev
  TEMPLATE_PATH: 外部登壇資料テンプレ

tasks:
  default:
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  new-slide-corp:
    desc: Create a new presentation with corporate R2 background templates
    summary: |
      Usage:
        task new-slide-corp -- <name> [slides=<count>]
        task new-slide-corp  (interactive mode)

      Examples:
        task new-slide-corp -- my-presentation
        task new-slide-corp -- demo slides=10

      Structure:
        - cover.tsx (表紙)
        - corporate-philosophy.tsx (企業理念)
        - business-content.tsx (事業内容)
        - self-introduction.tsx (自己紹介)
        - heading.tsx (見出し)
        - slide1.tsx ~ slideN.tsx (本文)
        - back-cover.tsx (裏表紙)
    cmds:
      - |
        # CLIオプションをパース
        NAME=""
        SLIDE_COUNT="{{.DEFAULT_SLIDE_COUNT}}"

        for arg in {{.CLI_ARGS}}; do
          case $arg in
            slides=*)
              SLIDE_COUNT="${arg#*=}"
              ;;
            *)
              if [ -z "$NAME" ]; then
                NAME="$arg"
              fi
              ;;
          esac
        done

        if [ -z "$NAME" ]; then
          echo "Enter presentation name:"
          read NAME
        fi

        if [ -z "$NAME" ]; then
          echo "Error: Presentation name is required"
          exit 1
        fi

        TARGET_DIR="{{.PRESENTATION_DIR}}/$NAME"
        R2_BASE="{{.R2_BASE_URL}}/{{.TEMPLATE_PATH}}"

        if [ -d "$TARGET_DIR" ]; then
          echo "Error: Presentation '$NAME' already exists"
          exit 1
        fi

        mkdir -p "$TARGET_DIR/slides"

        # page.tsx を作成
        {
          echo '"use client";'
          echo ''
          echo 'import RevealPresentation from "@/components/reveal-presentation";'
          echo 'import Cover from "./slides/cover";'
          echo 'import CorporatePhilosophy from "./slides/corporate-philosophy";'
          echo 'import BusinessContent from "./slides/business-content";'
          echo 'import SelfIntroduction from "./slides/self-introduction";'
          echo 'import Heading from "./slides/heading";'
          for i in $(seq 1 $SLIDE_COUNT); do
            echo "import Slide$i from \"./slides/slide$i\";"
          done
          echo 'import BackCover from "./slides/back-cover";'
          echo ''
          echo 'export default function PresentationPage() {'
          echo '	return ('
          echo '		<div style={{ "{{" }} width: "100%", height: "100%" {{ "}}" }}>'
          echo '			<RevealPresentation transition="slide">'
          echo '				<Cover />'
          echo '				<CorporatePhilosophy />'
          echo '				<BusinessContent />'
          echo '				<SelfIntroduction />'
          echo '				<Heading />'
          for i in $(seq 1 $SLIDE_COUNT); do
            echo "				<Slide$i />"
          done
          echo '				<BackCover />'
          echo '			</RevealPresentation>'
          echo '		</div>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/page.tsx"

        # 表紙スライド (cover.tsx)
        {
          echo 'export default function Cover() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/千_外部登壇スライド_表紙.png\""
          echo '			data-background-size="cover"'
          echo '		>'
          echo "			<h1>$NAME</h1>"
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/cover.tsx"

        # 企業理念スライド (corporate-philosophy.tsx)
        {
          echo 'export default function CorporatePhilosophy() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/千_外部登壇スライド_企業理念.png\""
          echo '			data-background-size="cover"'
          echo '		>'
          echo '			{/* コンテンツをここに追加 */}'
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/corporate-philosophy.tsx"

        # 事業内容スライド (business-content.tsx)
        {
          echo 'export default function BusinessContent() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/千_外部登壇スライド_事業内容.png\""
          echo '			data-background-size="cover"'
          echo '		>'
          echo '			{/* コンテンツをここに追加 */}'
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/business-content.tsx"

        # 自己紹介スライド (self-introduction.tsx)
        {
          echo 'export default function SelfIntroduction() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/千_外部登壇スライド_自己紹介.png\""
          echo '			data-background-size="cover"'
          echo '		>'
          echo '			{/* コンテンツをここに追加 */}'
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/self-introduction.tsx"

        # 見出しスライド (heading.tsx)
        {
          echo 'export default function Heading() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/千_外部登壇スライド_見出し.png\""
          echo '			data-background-size="cover"'
          echo '		>'
          echo '			{/* コンテンツをここに追加 */}'
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/heading.tsx"

        # 本文スライド (slide1.tsx ~ slideN.tsx)
        for i in $(seq 1 $SLIDE_COUNT); do
          {
            echo "export default function Slide$i() {"
            echo '	return ('
            echo '		<section'
            echo "			data-background-image=\"$R2_BASE/千_外部登壇スライド_本文.png\""
            echo '			data-background-size="cover"'
            echo '		>'
            echo "			<h2>Slide $i</h2>"
            echo '			<p>{/* コンテンツをここに追加 */}</p>'
            echo '		</section>'
            echo '	);'
            echo '}'
          } > "$TARGET_DIR/slides/slide$i.tsx"
        done

        # 裏表紙スライド (back-cover.tsx)
        {
          echo 'export default function BackCover() {'
          echo '	return ('
          echo '		<section'
          echo "			data-background-image=\"$R2_BASE/千_外部登壇スライド_裏表紙.png\""
          echo '			data-background-size="cover"'
          echo '		>'
          echo '			{/* コンテンツをここに追加 */}'
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/back-cover.tsx"

        # layout.tsx を作成（全画面固定スタイル付き）
        {
          echo 'import type { Metadata } from "next";'
          echo ''
          echo 'export const metadata: Metadata = {'
          echo "	title: \"$NAME | mySlides\","
          echo "	description: \"$NAME - A presentation created with mySlides and Reveal.js\","
          echo '	openGraph: {'
          echo "		title: \"$NAME\","
          echo "		description: \"$NAME - A presentation created with mySlides and Reveal.js\","
          echo '		type: "website",'
          echo '	},'
          echo '	twitter: {'
          echo '		card: "summary_large_image",'
          echo "		title: \"$NAME\","
          echo "		description: \"$NAME - A presentation created with mySlides and Reveal.js\","
          echo '	},'
          echo '};'
          echo ''
          echo 'export default function Layout({ children }: { children: React.ReactNode }) {'
          echo '	return ('
          echo '		<div'
          echo '			style={{ "{{" }}'
          echo '				width: "100%",'
          echo '				height: "100vh",'
          echo '				overflow: "hidden",'
          echo '				position: "fixed",'
          echo '				top: 0,'
          echo '				left: 0,'
          echo '				right: 0,'
          echo '				bottom: 0,'
          echo '			{{ "}}" }}'
          echo '		>'
          echo '			{children}'
          echo '		</div>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/layout.tsx"

        # opengraph-image.tsx を作成
        {
          echo 'import { ImageResponse } from "next/og";'
          echo ''
          echo "export const alt = \"$NAME\";"
          echo 'export const size = {'
          echo '	width: 1200,'
          echo '	height: 630,'
          echo '};'
          echo 'export const contentType = "image/png";'
          echo ''
          echo 'export default function Image() {'
          echo '	return new ImageResponse('
          echo '		<div'
          echo '			style={{ "{{" }}'
          echo '				width: "100%",'
          echo '				height: "100%",'
          echo '				display: "flex",'
          echo '				alignItems: "center",'
          echo '				justifyContent: "center",'
          echo '				position: "relative",'
          echo '			{{ "}}" }}'
          echo '		>'
          echo '			<img'
          echo "				src=\"$R2_BASE/千_外部登壇スライド_表紙.png\""
          echo '				style={{ "{{" }}'
          echo '					position: "absolute",'
          echo '					top: 0,'
          echo '					left: 0,'
          echo '					width: "100%",'
          echo '					height: "100%",'
          echo '					objectFit: "cover",'
          echo '				{{ "}}" }}'
          echo '			/>'
          echo '		</div>,'
          echo '		{'
          echo '			width: 1200,'
          echo '			height: 630,'
          echo '		}'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/opengraph-image.tsx"

        # presentations.ts にエントリを追加
        PRESENTATIONS_FILE="{{.PRESENTATION_DIR}}/presentations.ts"
        DISPLAY_NAME="$NAME"

        LINE_NUM=$(grep -n '^] as const;$' "$PRESENTATIONS_FILE" | cut -d: -f1)
        head -n $((LINE_NUM - 1)) "$PRESENTATIONS_FILE" > "$PRESENTATIONS_FILE.tmp"
        echo "	{" >> "$PRESENTATIONS_FILE.tmp"
        echo "		id: \"$NAME\"," >> "$PRESENTATIONS_FILE.tmp"
        echo "		name: \"$DISPLAY_NAME\"," >> "$PRESENTATIONS_FILE.tmp"
        echo "		href: \"/presentation/$NAME\" as const," >> "$PRESENTATIONS_FILE.tmp"
        echo "	}," >> "$PRESENTATIONS_FILE.tmp"
        tail -n +$LINE_NUM "$PRESENTATIONS_FILE" >> "$PRESENTATIONS_FILE.tmp"
        mv "$PRESENTATIONS_FILE.tmp" "$PRESENTATIONS_FILE"

        TOTAL_SLIDES=$((SLIDE_COUNT + 6))
        echo "✓ Created presentation '$NAME' with $TOTAL_SLIDES slides"
        echo "  - 表紙: 1枚"
        echo "  - 企業理念: 1枚"
        echo "  - 事業内容: 1枚"
        echo "  - 自己紹介: 1枚"
        echo "  - 見出し: 1枚"
        echo "  - 本文: $SLIDE_COUNT枚"
        echo "  - 裏表紙: 1枚"
        echo "  Location: $TARGET_DIR"
        echo "✓ Added entry to presentations.ts"
    silent: false

  new-slide:
    desc: Create a new simple presentation (no corporate template)
    summary: |
      Usage:
        task new-slide -- <name> [slides=<count>]
        task new-slide  (interactive mode)

      Examples:
        task new-slide -- my-presentation
        task new-slide -- demo slides=10

      Structure:
        - cover.tsx (表紙)
        - slide1.tsx ~ slideN.tsx (本文)
        - back-cover.tsx (裏表紙)

      Note: For corporate template, use 'task new-slide-corp'
    cmds:
      - |
        # CLIオプションをパース
        NAME=""
        SLIDE_COUNT="{{.DEFAULT_SLIDE_COUNT}}"

        for arg in {{.CLI_ARGS}}; do
          case $arg in
            slides=*)
              SLIDE_COUNT="${arg#*=}"
              ;;
            *)
              if [ -z "$NAME" ]; then
                NAME="$arg"
              fi
              ;;
          esac
        done

        if [ -z "$NAME" ]; then
          echo "Enter presentation name:"
          read NAME
        fi

        if [ -z "$NAME" ]; then
          echo "Error: Presentation name is required"
          exit 1
        fi

        TARGET_DIR="{{.PRESENTATION_DIR}}/$NAME"

        if [ -d "$TARGET_DIR" ]; then
          echo "Error: Presentation '$NAME' already exists"
          exit 1
        fi

        mkdir -p "$TARGET_DIR/slides"

        # page.tsx を作成
        {
          echo '"use client";'
          echo ''
          echo 'import RevealPresentation from "@/components/reveal-presentation";'
          echo 'import Cover from "./slides/cover";'
          for i in $(seq 1 $SLIDE_COUNT); do
            echo "import Slide$i from \"./slides/slide$i\";"
          done
          echo 'import BackCover from "./slides/back-cover";'
          echo ''
          echo 'export default function PresentationPage() {'
          echo '	return ('
          echo '		<div style={{ "{{" }} width: "100%", height: "100%" {{ "}}" }}>'
          echo '			<RevealPresentation transition="slide">'
          echo '				<Cover />'
          for i in $(seq 1 $SLIDE_COUNT); do
            echo "				<Slide$i />"
          done
          echo '				<BackCover />'
          echo '			</RevealPresentation>'
          echo '		</div>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/page.tsx"

        # 表紙スライド (cover.tsx) - シンプル版
        {
          echo 'export default function Cover() {'
          echo '	return ('
          echo '		<section>'
          echo "			<h1>$NAME</h1>"
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/cover.tsx"

        # 本文スライド (slide1.tsx ~ slideN.tsx) - シンプル版
        for i in $(seq 1 $SLIDE_COUNT); do
          {
            echo "export default function Slide$i() {"
            echo '	return ('
            echo '		<section>'
            echo "			<h2>Slide $i</h2>"
            echo '			<p>{/* コンテンツをここに追加 */}</p>'
            echo '		</section>'
            echo '	);'
            echo '}'
          } > "$TARGET_DIR/slides/slide$i.tsx"
        done

        # 裏表紙スライド (back-cover.tsx) - シンプル版
        {
          echo 'export default function BackCover() {'
          echo '	return ('
          echo '		<section>'
          echo '			<h2>Thank you!</h2>'
          echo '		</section>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/slides/back-cover.tsx"

        # layout.tsx を作成（全画面固定スタイル付き）
        {
          echo 'import type { Metadata } from "next";'
          echo ''
          echo 'export const metadata: Metadata = {'
          echo "	title: \"$NAME | mySlides\","
          echo "	description: \"$NAME - A presentation created with mySlides and Reveal.js\","
          echo '	openGraph: {'
          echo "		title: \"$NAME\","
          echo "		description: \"$NAME - A presentation created with mySlides and Reveal.js\","
          echo '		type: "website",'
          echo '	},'
          echo '	twitter: {'
          echo '		card: "summary_large_image",'
          echo "		title: \"$NAME\","
          echo "		description: \"$NAME - A presentation created with mySlides and Reveal.js\","
          echo '	},'
          echo '};'
          echo ''
          echo 'export default function Layout({ children }: { children: React.ReactNode }) {'
          echo '	return ('
          echo '		<div'
          echo '			style={{ "{{" }}'
          echo '				width: "100%",'
          echo '				height: "100vh",'
          echo '				overflow: "hidden",'
          echo '				position: "fixed",'
          echo '				top: 0,'
          echo '				left: 0,'
          echo '				right: 0,'
          echo '				bottom: 0,'
          echo '			{{ "}}" }}'
          echo '		>'
          echo '			{children}'
          echo '		</div>'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/layout.tsx"

        # opengraph-image.tsx を作成 - シンプル版（グラデーション背景）
        {
          echo 'import { ImageResponse } from "next/og";'
          echo ''
          echo "export const alt = \"$NAME\";"
          echo 'export const size = {'
          echo '	width: 1200,'
          echo '	height: 630,'
          echo '};'
          echo 'export const contentType = "image/png";'
          echo ''
          echo 'export default function Image() {'
          echo '	return new ImageResponse('
          echo '		<div'
          echo '			style={{ "{{" }}'
          echo '				width: "100%",'
          echo '				height: "100%",'
          echo '				display: "flex",'
          echo '				alignItems: "center",'
          echo '				justifyContent: "center",'
          echo '				background: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",'
          echo '				color: "white",'
          echo '				fontSize: 64,'
          echo '				fontWeight: "bold",'
          echo '			{{ "}}" }}'
          echo '		>'
          echo "			$NAME"
          echo '		</div>,'
          echo '		{'
          echo '			width: 1200,'
          echo '			height: 630,'
          echo '		}'
          echo '	);'
          echo '}'
        } > "$TARGET_DIR/opengraph-image.tsx"

        # presentations.ts にエントリを追加
        PRESENTATIONS_FILE="{{.PRESENTATION_DIR}}/presentations.ts"
        DISPLAY_NAME="$NAME"

        LINE_NUM=$(grep -n '^] as const;$' "$PRESENTATIONS_FILE" | cut -d: -f1)
        head -n $((LINE_NUM - 1)) "$PRESENTATIONS_FILE" > "$PRESENTATIONS_FILE.tmp"
        echo "	{" >> "$PRESENTATIONS_FILE.tmp"
        echo "		id: \"$NAME\"," >> "$PRESENTATIONS_FILE.tmp"
        echo "		name: \"$DISPLAY_NAME\"," >> "$PRESENTATIONS_FILE.tmp"
        echo "		href: \"/presentation/$NAME\" as const," >> "$PRESENTATIONS_FILE.tmp"
        echo "	}," >> "$PRESENTATIONS_FILE.tmp"
        tail -n +$LINE_NUM "$PRESENTATIONS_FILE" >> "$PRESENTATIONS_FILE.tmp"
        mv "$PRESENTATIONS_FILE.tmp" "$PRESENTATIONS_FILE"

        TOTAL_SLIDES=$((SLIDE_COUNT + 2))
        echo "✓ Created simple presentation '$NAME' with $TOTAL_SLIDES slides"
        echo "  - 表紙: 1枚"
        echo "  - 本文: $SLIDE_COUNT枚"
        echo "  - 裏表紙: 1枚"
        echo "  Location: $TARGET_DIR"
        echo "✓ Added entry to presentations.ts"
        echo ""
        echo "Tip: Use 'task new-slide-corp' for corporate template"
    silent: false
