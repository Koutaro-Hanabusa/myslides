name: CI

on:
  pull_request:
  push:
    branches: [staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"
      - run: bun install --frozen-lockfile
      - name: Lint (oxlint)
        run: bun oxlint
      - name: Format check (oxfmt)
        run: bun oxfmt --check
